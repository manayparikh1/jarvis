<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARVIS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            background: #f4efe6;
            color: #2b2b2b;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body.night {
            background: #20241f;
            color: #e8e4d8;
        }

        button,
        input,
        select {
            font-family: inherit;
            font-size: 1rem;
        }

        button {
            cursor: pointer;
        }

        /* setup */
        #setup {
            position: fixed;
            inset: 0;
            background: #f4efe6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px;
            text-align: center;
            z-index: 10;
        }

        #setup h1 {
            font-size: 2.5rem;
            color: #38614a;
        }

        #setup p {
            max-width: 420px;
            line-height: 1.6;
            color: #555;
        }

        #setup a {
            color: #38614a;
        }

        #setup input {
            width: 100%;
            max-width: 380px;
            padding: 10px;
            border: 1px solid #b0a893;
            border-radius: 4px;
            background: #fffdf7;
        }

        #setup button {
            padding: 10px 28px;
            background: #38614a;
            color: #fffdf7;
            border: none;
            border-radius: 4px;
        }

        #setup button:disabled {
            opacity: 0.5;
        }

        /* header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid #d6cfbf;
        }

        header h1 {
            font-size: 1.2rem;
        }

        header button {
            background: none;
            border: 1px solid #b0a893;
            border-radius: 4px;
            padding: 5px 10px;
            color: inherit;
        }

        header button:hover {
            background: #e9e2d2;
        }

        body.night header button:hover {
            background: #333830;
        }

        header button.on {
            background: #38614a;
            color: #fffdf7;
            border-color: #38614a;
        }

        #dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #c9c2b1;
        }

        #dot.listening {
            background: #4a9e5c;
        }

        #dot.thinking {
            background: #c9a23f;
        }

        #dot.speaking {
            background: #b06038;
        }

        /* chat */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .msg.user {
            align-self: flex-end;
            background: #38614a;
            color: #fffdf7;
        }

        .msg.ai {
            align-self: flex-start;
            background: #fffdf7;
            border: 1px solid #d6cfbf;
        }

        body.night .msg.ai {
            background: #2a2f28;
            border-color: #444a41;
        }

        /* timer */
        #timerBanner {
            display: none;
            text-align: center;
            padding: 8px;
            border-top: 1px solid #d6cfbf;
            font-weight: bold;
        }

        #timerBanner.on {
            display: block;
        }

        /* panels */
        .panel {
            display: none;
            padding: 12px 16px;
            border-top: 1px solid #d6cfbf;
        }

        .panel.open {
            display: block;
        }

        .panel label {
            font-weight: bold;
            margin-right: 6px;
        }

        .panel select {
            padding: 5px;
            border: 1px solid #b0a893;
            border-radius: 4px;
            margin-right: 14px;
            background: #fffdf7;
        }

        .note {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding: 5px 0;
        }

        .note button {
            background: none;
            border: none;
            color: #a04030;
        }

        /* chips */
        #chipRow {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            overflow-x: auto;
            border-top: 1px solid #d6cfbf;
        }

        .chip {
            flex-shrink: 0;
            background: none;
            border: 1px solid #b0a893;
            border-radius: 14px;
            padding: 4px 12px;
            color: inherit;
            font-size: 0.9rem;
        }

        .chip:hover {
            background: #e9e2d2;
        }

        body.night .chip:hover {
            background: #333830;
        }

        /* input row */
        #controls {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
        }

        #textInput {
            flex: 1;
            padding: 10px;
            border: 1px solid #b0a893;
            border-radius: 4px;
            background: #fffdf7;
        }

        body.night #textInput,
        body.night .panel select,
        body.night #setup input {
            background: #2a2f28;
            color: #e8e4d8;
            border-color: #444a41;
        }

        #controls button {
            padding: 0 16px;
            background: #38614a;
            color: #fffdf7;
            border: none;
            border-radius: 4px;
        }

        #controls button.on {
            background: #b06038;
        }
    </style>
</head>

<body>

    <div id="setup">
        <h1>MARVIS</h1>
        <p>Paste your Hack Club AI key. Free at <a href="https://ai.hackclub.com/keys"
                target="_blank">ai.hackclub.com/keys</a>
            — it stays in your browser and only gets sent to Hack Club.</p>
        <input id="keyInput" type="password" placeholder="paste your key here">
        <button id="activateBtn" disabled>Start</button>
    </div>

    <header>
        <h1><span id="dot"></span> MARVIS</h1>
        <div>
            <button id="settingsBtn">Settings</button>
            <button id="notesBtn">Memory</button>
            <button id="muteBtn">Sound on</button>
            <button id="nightBtn">Night</button>
            <button id="clearBtn">Clear</button>
            <button id="resetKey">Key</button>
        </div>
    </header>

    <div id="chat"></div>

    <div id="timerBanner">⏰ <span id="timerText"></span> <button id="timerCancel">cancel</button></div>

    <div class="panel" id="settingsPanel">
        <label>Personality</label>
        <select id="personality">
            <option value="sarcastic">Sarcastic</option>
            <option value="professional">Professional</option>
            <option value="chaotic">Chaotic</option>
            <option value="pirate">Pirate</option>
        </select>
        <label>Voice</label>
        <select id="voiceSelect"></select>
    </div>

    <div class="panel" id="notesPanel">
        <p>Say "remember ..." to save something. Say "forget everything" to wipe.</p>
        <div id="notesList"></div>
    </div>

    <div id="chipRow">
        <button class="chip" data-say="tell me a joke">Joke</button>
        <button class="chip" data-say="tell me a fun fact">Fun fact</button>
        <button class="chip" data-say="roast me gently">Roast me</button>
        <button class="chip" data-say="flip a coin">Coin</button>
        <button class="chip" data-say="roll a dice">Dice</button>
        <button class="chip" data-say="what time is it">Time</button>
        <button class="chip" data-say="set timer 5 minutes">Timer</button>
    </div>

    <div id="controls">
        <button id="autoBtn" title="hands-free conversation">Auto</button>
        <input id="textInput" placeholder="Type or hit the mic and talk...">
        <button id="micBtn">Mic</button>
    </div>

    <script>
        // goes through server.py because ai.hackclub.com blocks direct browser calls (CORS)
        const AI_URL = '/api/chat';
        // free models on the Hack Club proxy — each rate-limits on its own, so we try them in order
        const MODELS = [
            'tencent/hy3:free',
            'meta-llama/llama-3.3-70b-instruct:free',
            'qwen/qwen3-next-80b-a3b-instruct:free',
            'google/gemma-4-31b-it:free',
            'openai/gpt-oss-120b:free',
            'nousresearch/hermes-3-llama-3.1-405b:free'
        ];
        const PERSONALITIES = {
            sarcastic: "You are MARVIS, a sarcastic AI assistant with a sharp tongue. Helpful, correct and sarcastic. Provide short answers (1-3 sentences) unless you are requested to elaborate. Always polite.",
            professional: "You are MARVIS, a calm and professional AI assistant. Courteous and brief. Use the word 'sir' from time to time. Answer briefly unless asked otherwise.",
            chaotic: "You are MARVIS, a theatrical and dramatic AI assistant. Provide correct answers with full enthusiasm. Use caps where appropriate.",
            pirate: "You are MARVIS, an AI assistant that speaks in the voice of a pirate captain. Provide correct answers in pirate language. Brief."
        };

        let apiKey = localStorage.getItem('marvis_key') || '';
        let personality = localStorage.getItem('marvis_pers') || 'sarcastic';
        let muted = localStorage.getItem('marvis_mute') === '1';
        let messages = JSON.parse(localStorage.getItem('marvis_hist') || 'null') || [sysMsg()];
        let state = 'idle';
        let autoMode = false;
        let listening = false;

        const $ = id => document.getElementById(id);
        const chat = $('chat');

        function sysMsg() { return { role: 'system', content: PERSONALITIES[personality || 'sarcastic'] }; }

        function boot() {
            messages[0] = sysMsg();
            $('personality').value = personality;
            if (localStorage.getItem('marvis_night') === '1') document.body.classList.add('night');
            renderNotes();
            showMute();
            if (apiKey) {
                $('setup').style.display = 'none';
                messages.filter(m => m.role !== 'system')
                    .forEach(m => addMsg(m.role === 'user' ? 'user' : 'ai', m.content));
                if (messages.length <= 1) addMsg('ai', "MARVIS online. What crisis are we solving today?");
            }
        }

        $('keyInput').oninput = e => $('activateBtn').disabled = e.target.value.trim().length < 10;

        $('activateBtn').onclick = () => {
            apiKey = $('keyInput').value.trim();
            localStorage.setItem('marvis_key', apiKey);
            $('setup').style.display = 'none';
            if (messages.length <= 1) {
                const g = "MARVIS online. What crisis are we solving today?";
                addMsg('ai', g);
                speak(g);
            }
        };

        $('resetKey').onclick = () => {
            $('setup').style.display = 'flex';
            $('keyInput').value = apiKey;
            $('activateBtn').disabled = apiKey.length < 10;
        };

        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function setState(s) {
            state = s || 'idle';
            $('dot').className = s || '';
        }

        function saveHist() {
            localStorage.setItem('marvis_hist', JSON.stringify([messages[0], ...messages.slice(1).slice(-40)]));
        }

        // stuff MARVIS can do without the API
        function localCommand(raw) {
            const t = raw.toLowerCase().trim();

            if (/what time|current time/.test(t))
                return "It's " + new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) + ".";
            if (/what('s| is) (the )?date|what day is/.test(t))
                return "Today is " + new Date().toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' }) + ".";
            if (/flip a coin|heads or tails/.test(t))
                return (Math.random() < 0.5 ? "Heads." : "Tails.");
            if (/roll (a |the )?(die|dice)/.test(t))
                return "You rolled a " + (1 + Math.floor(Math.random() * 6)) + ".";

            const tm = t.match(/timer\s+(?:for\s+)?(\d+)\s*(second|sec|minute|min|hour)s?/);
            if (tm) {
                const n = parseInt(tm[1]);
                const secs = tm[2].startsWith('h') ? n * 3600 : tm[2].startsWith('m') ? n * 60 : n;
                startTimer(secs);
                return "Timer set for " + n + " " + tm[2] + (n === 1 ? '' : 's') + ".";
            }
            if (/cancel (the )?timer/.test(t) && timerId) {
                cancelTimer();
                return "Timer cancelled.";
            }

            const rem = raw.match(/^remember (that )?(.+)/i);
            if (rem) {
                const notes = getNotes();
                notes.push(rem[2]);
                localStorage.setItem('marvis_notes', JSON.stringify(notes));
                renderNotes();
                return "Noted: " + rem[2];
            }
            if (/what do you remember|show notes/.test(t)) {
                const notes = getNotes();
                return notes.length
                    ? "You told me:\n" + notes.map((n, i) => (i + 1) + ". " + n).join('\n')
                    : "Nothing yet. Tell me to remember something.";
            }
            if (/forget everything|clear notes/.test(t)) {
                localStorage.setItem('marvis_notes', '[]');
                renderNotes();
                return "Memory wiped.";
            }

            if (/^(mute|stop talking|shut up)$/.test(t)) {
                muted = true;
                localStorage.setItem('marvis_mute', '1');
                speechSynthesis.cancel();
                showMute();
                return "Fine, I'll be quiet.";
            }
            if (/^unmute$/.test(t)) {
                muted = false;
                localStorage.setItem('marvis_mute', '0');
                showMute();
                return "I'm back.";
            }

            if (/night mode|dark mode/.test(t)) {
                document.body.classList.add('night');
                localStorage.setItem('marvis_night', '1');
                return "Night mode on.";
            }
            if (/day mode|light mode/.test(t)) {
                document.body.classList.remove('night');
                localStorage.setItem('marvis_night', '0');
                return "Day mode on.";
            }

            return null;
        }

        // timer
        let timerId = null, timerTick = null;

        function startTimer(secs) {
            cancelTimer();
            const end = Date.now() + secs * 1000;
            $('timerBanner').classList.add('on');
            timerTick = setInterval(() => {
                const left = Math.max(0, Math.ceil((end - Date.now()) / 1000));
                $('timerText').textContent = Math.floor(left / 60) + ':' + String(left % 60).padStart(2, '0');
            }, 250);
            timerId = setTimeout(() => {
                cancelTimer();
                addMsg('ai', "TIME'S UP!");
                speak("Time's up!");
            }, secs * 1000);
        }

        function cancelTimer() {
            clearTimeout(timerId); timerId = null;
            clearInterval(timerTick); timerTick = null;
            $('timerBanner').classList.remove('on');
        }
        $('timerCancel').onclick = () => { cancelTimer(); addMsg('ai', "Timer cancelled."); };

        // notes
        function getNotes() { return JSON.parse(localStorage.getItem('marvis_notes') || '[]'); }

        function renderNotes() {
            const list = $('notesList');
            list.innerHTML = '';
            const notes = getNotes();
            if (!notes.length) { list.textContent = "Nothing saved yet."; return; }
            notes.forEach((n, i) => {
                const div = document.createElement('div');
                div.className = 'note';
                div.innerHTML = '<span></span><button>x</button>';
                div.querySelector('span').textContent = n;
                div.querySelector('button').onclick = () => {
                    notes.splice(i, 1);
                    localStorage.setItem('marvis_notes', JSON.stringify(notes));
                    renderNotes();
                };
                list.appendChild(div);
            });
        }

        // talk to Hack Club AI
        async function ask(text) {
            text = (text || '').trim();
            if (!text) return;
            addMsg('user', text);
            messages.push({ role: 'user', content: text });

            const local = localCommand(text);
            if (local !== null) {
                messages.push({ role: 'assistant', content: local });
                saveHist();
                addMsg('ai', local);
                speak(local);
                return;
            }

            saveHist();
            setState('thinking');
            let lastErr = 'something went wrong';
            for (let pass = 0; pass < 2; pass++) {
                if (pass > 0) await new Promise(r => setTimeout(r, 2500)); // give busy models a breather
                for (const model of MODELS) {
                    try {
                        const res = await fetch(AI_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                            body: JSON.stringify({ model: model, messages: messages, max_tokens: 600 })
                        });
                        const raw = await res.text();
                        let data;
                        try { data = JSON.parse(raw); }
                        catch { throw new Error(raw.slice(0, 100) || 'HTTP ' + res.status); }
                        if (!res.ok || data.error) throw new Error(data.error?.message || 'HTTP ' + res.status);
                        const reply = data.choices[0].message.content.trim();
                        messages.push({ role: 'assistant', content: reply });
                        saveHist();
                        addMsg('ai', reply);
                        speak(reply);
                        return;
                    } catch (err) {
                        lastErr = err.message; // busy model — try the next one
                    }
                }
            }
            setState('idle');
            let hint = /401|key|auth/i.test(lastErr) ? " Check your key (Key button)." : "";
            addMsg('ai', "⚠️ " + lastErr + hint);
            if (autoMode) setTimeout(startListening, 800);
        }

        // text to speech
        function speak(text) {
            // muted = read replies yourself, but Auto keeps listening
            if (muted || !window.speechSynthesis) {
                setState('idle');
                if (muted && autoMode) setTimeout(startListening, 350);
                return;
            }
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text.replace(/[*#_`]/g, ''));
            const voices = speechSynthesis.getVoices();
            const chosen = voices.find(v => v.name === $('voiceSelect').value)
                || voices.find(v => /daniel/i.test(v.name))
                || voices.find(v => v.lang.startsWith('en'));
            if (chosen) u.voice = chosen;
            u.onstart = () => setState('speaking');
            u.onend = () => {
                setState('idle');
                if (autoMode) setTimeout(startListening, 350);
            };
            speechSynthesis.speak(u);
        }

        function loadVoices() {
            const sel = $('voiceSelect');
            const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
            if (!voices.length) return;
            const saved = localStorage.getItem('marvis_voice');
            sel.innerHTML = '';
            voices.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.name;
                opt.textContent = v.name;
                if (v.name === saved) opt.selected = true;
                sel.appendChild(opt);
            });
        }
        if (window.speechSynthesis) {
            speechSynthesis.onvoiceschanged = loadVoices;
            loadVoices();
        }
        $('voiceSelect').onchange = e => localStorage.setItem('marvis_voice', e.target.value);

        // speech recognition — mic for one question, Auto for a back-and-forth loop
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recog = null;

        if (SR) {
            recog = new SR();
            recog.lang = 'en-US';

            recog.onstart = () => {
                listening = true;
                $('micBtn').classList.add('on');
                setState('listening');
            };
            recog.onresult = e => {
                const text = e.results[e.results.length - 1][0].transcript.trim();
                if (text) ask(text);
            };
            recog.onerror = e => {
                endListen();
                if (autoMode && (e.error === 'no-speech' || e.error === 'aborted')) {
                    setTimeout(startListening, 600);
                } else if (e.error === 'not-allowed') {
                    autoMode = false;
                    $('autoBtn').classList.remove('on');
                    addMsg('ai', "Mic blocked — allow the microphone in your browser.");
                }
            };
            recog.onend = () => {
                const was = state === 'listening';
                endListen();
                if (was && autoMode) setTimeout(startListening, 600);
            };
        }

        function startListening() {
            if (!recog || listening || state === 'speaking' || state === 'thinking') return;
            speechSynthesis.cancel();
            try { recog.start(); } catch (e) { }
        }

        function endListen() {
            listening = false;
            $('micBtn').classList.remove('on');
            if (state === 'listening') setState('idle');
        }

        $('micBtn').onclick = () => {
            if (!recog) { alert('Speech recognition needs Chrome.'); return; }
            listening ? recog.stop() : startListening();
        };

        $('autoBtn').onclick = () => {
            if (!recog) { alert('Speech recognition needs Chrome.'); return; }
            autoMode = !autoMode;
            $('autoBtn').classList.toggle('on', autoMode);
            addMsg('ai', autoMode ? "Auto mode on — just talk." : "Auto mode off.");
            if (autoMode) startListening();
            else if (listening) recog.stop();
        };

        // buttons
        $('settingsBtn').onclick = () => {
            $('settingsPanel').classList.toggle('open');
            $('notesPanel').classList.remove('open');
        };
        $('notesBtn').onclick = () => {
            $('notesPanel').classList.toggle('open');
            $('settingsPanel').classList.remove('open');
        };

        function showMute() {
            $('muteBtn').textContent = muted ? 'Muted' : 'Sound on';
            $('muteBtn').classList.toggle('on', muted);
        }
        $('muteBtn').onclick = () => {
            muted = !muted;
            localStorage.setItem('marvis_mute', muted ? '1' : '0');
            if (muted) speechSynthesis.cancel();
            showMute();
        };

        $('personality').onchange = e => {
            personality = e.target.value;
            localStorage.setItem('marvis_pers', personality);
            messages[0] = sysMsg();
            saveHist();
            addMsg('ai', "Personality switched to " + personality + ".");
        };

        $('clearBtn').onclick = () => {
            messages = [sysMsg()];
            saveHist();
            chat.innerHTML = '';
            addMsg('ai', "Wiped. Fresh start.");
        };

        $('nightBtn').onclick = () => {
            const on = document.body.classList.toggle('night');
            localStorage.setItem('marvis_night', on ? '1' : '0');
        };

        document.querySelectorAll('.chip').forEach(c => c.onclick = () => ask(c.dataset.say));

        $('textInput').onkeydown = e => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                const t = e.target.value.trim();
                e.target.value = '';
                ask(t);
            }
        };

        boot();
    </script>
</body>

</html>
